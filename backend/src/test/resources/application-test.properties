server.port=0

spring.datasource.url=jdbc:h2:mem:tourism_test_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.jwt.secret=test-jwt-secret-key-with-at-least-thirty-two-characters-long
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=604800000
app.frontend.url=http://localhost:5173,http://localhost:8080

spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
