# ===============================
# APPLICATION
# ===============================
spring.application.name=stayvista-backend
server.port=${PORT:${SERVER_PORT:2026}}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.file.upload-dir=${APP_FILE_UPLOAD_DIR:uploads}

# ===============================
# JWT CONFIG
# ===============================
app.jwt.secret=${APP_JWT_SECRET:dev-only-change-this-jwt-secret-before-submit-2026}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}
app.jwt.refresh-expiration-ms=${APP_JWT_REFRESH_EXPIRATION_MS:604800000}

# ===============================
# FRONTEND (CORS)
# ===============================
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173,http://localhost:8080}

# ===============================
# MAIL CONFIG
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# ===============================
# SWAGGER / OPENAPI
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# GOOGLE OAUTH2 CONFIG
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=${GOOGLE_SCOPE:email,profile}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.tourism.app=DEBUG
